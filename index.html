<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给曼曼宝贝的道歉信</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #000 url('https://picsum.photos/id/40/1920/1080') no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            color: #eee;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 星空蒙版 */
        .mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1;
        }

        /* 飘落爱心容器 */
        #heartContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .heart-fall {
            position: absolute;
            color: #ff5e8a;
            font-size: 20px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        /* 主体卡片 */
        .card {
            position: relative;
            z-index: 3;
            max-width: 680px;
            margin: 60px auto;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
        }

        .title {
            font-size: 26px;
            color: #ff87a2;
            margin-bottom: 25px;
        }

        /* 合照轮播区域 */
        .photo-slider {
            width: 80%;
            margin: 0 auto 30px;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid rgba(255, 135, 162, 0.4);
            position: relative;
            height: 350px;
        }

        .photo-slider img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        .photo-slider img.active {
            display: block;
            animation: fade 1s ease;
        }

        @keyframes fade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 打字机文字 */
        .text-content {
            font-size: 16px;
            line-height: 2;
            text-align: left;
            padding: 0 10px;
            color: #e0e0e0;
            min-height: 280px;
            white-space: pre-line;
        }

        /* 按钮 */
        .btn-box {
            margin-top: 35px;
            position: relative;
        }

        .btn {
            padding: 10px 26px;
            margin: 0 10px;
            border-radius: 30px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-yes {
            background: #ff5e8a;
            color: #fff;
        }

        .btn-no {
            background: transparent;
            border: 1px solid #ff87a2;
            color: #ff87a2;
            position: relative;
        }

        .signature {
            margin-top: 40px;
            text-align: right;
            color: #aaa;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="mask"></div>
    <div id="heartContainer"></div>

    <div class="card">
        <h2 class="title">致 曼曼宝贝 💔</h2>

        <!-- 合照轮播 -->
        <div class="photo-slider">
            <img src="photo1.jpg" alt="我们的合照" class="active">
            <img src="photo2.jpg" alt="我们的合照">
            <img src="photo3.jpg" alt="我们的合照">
            <img src="photo4.jpg" alt="曼曼宝贝">
            <img src="photo5.jpg" alt="曼曼宝贝">
        </div>

        <div class="text-content" id="typeText"></div>

        <div class="btn-box">
            <button class="btn btn-yes" onclick="yesForgive()">原谅你啦</button>
            <button class="btn btn-no" id="noBtn">再生气一会</button>
        </div>

        <div class="signature">
            一直很爱你的我
        </div>
    </div>

    <!-- 背景音乐 -->
    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    

    <script>
        // 道歉文案 按你原话整理
        const apologyText = `我不应该迟到，
不应该说到做不到。
不应该记不住我们之间很多点点滴滴，
也不应该经常回消息不及时。

我知道工作忙、在实验室经常看不了手机，但这不能当作忽略你的理由。

我应该多站在你的角度考虑问题，
我知道你不是大题小做，
只是缺少我的在意和偏爱。

以后我一定多顾及你的感受，
好好改正，好好偏爱曼曼宝贝，
再也不让你委屈难过了。
对不起，原谅我好不好？`;

        // 打字机效果
        let index = 0;
        const el = document.getElementById('typeText');
        function typeWrite() {
            if (index < apologyText.length) {
                el.innerHTML += apologyText.charAt(index);
                index++;
                setTimeout(typeWrite, 60);
            }
        }

        // 照片轮播
        let photoIndex = 0;
        const photos = document.querySelectorAll('.photo-slider img');
        function slidePhotos() {
            photos.forEach(p => p.classList.remove('active'));
            photoIndex = (photoIndex + 1) % photos.length;
            photos[photoIndex].classList.add('active');
        }

        // 飘落爱心
        function createHeart() {
            const container = document.getElementById('heartContainer');
            const heart = document.createElement('div');
            heart.className = 'heart-fall';
            heart.innerHTML = '❤';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = Math.random() * 3 + 4 + 's';
            container.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 7000);
        }

        // 页面加载完成
        window.onload = function () {
            typeWrite();
            setInterval(createHeart, 200);
            setInterval(slidePhotos, 3000);
            // 自动播放音乐（部分浏览器需要用户交互才能播放，所以这里先设置音量）
            const music = document.getElementById('bgMusic');
            music.volume = 0.4;
            document.body.addEventListener('click', () => {
                music.play().catch(e => console.log("音乐播放需要用户交互"));
            }, { once: true });
        }

        // 原谅按钮
        function yesForgive() {
            alert('谢谢曼曼宝贝原谅我！我一定说到做到，好好爱你🥰');
            document.title = '曼曼宝贝原谅我啦！';
            document.body.style.background = "linear-gradient(to right, #ffecd2, #fcb69f)";
            document.querySelector('.mask').style.background = "rgba(0,0,0,0.3)";
        }

        // 不原谅按钮乱跑
        const noBtn = document.getElementById('noBtn');
        noBtn.onmouseover = function () {
            const w = document.documentElement.clientWidth - 100;
            const h = document.documentElement.clientHeight - 50;
            noBtn.style.position = 'fixed';
            noBtn.style.left = Math.random() * w + 'px';
            noBtn.style.top = Math.random() * h + 'px';
        }
    </script>
</body>
</html>
